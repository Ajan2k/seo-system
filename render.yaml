services:
  # 1. The main FastAPI Web Service
  - type: web
    name: ai-blog-automation
    runtime: python               
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION       
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false               
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-blog-redis
          property: connectionString

  # 2. The Celery Background Worker
  - type: worker
    name: ai-blog-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.celery_app.celery_app worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL         # Must be set manually in the Render dashboard for the worker
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-blog-redis
          property: connectionString

  # 3. The Redis Key-Value Store
  - type: redis
    name: ai-blog-redis
    ipAllowList: [] # Only allow internal connections
    plan: free # Can be updated if you upgrade