version: '3.8'

services:
  web:
    build: .
    container_name: infiniteseo_web
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://postgres:securepassword123@db:5432/infiniteseo
      - REDIS_URL=redis://redis:6380/0
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8001"
    restart: always
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: infiniteseo_worker
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://postgres:securepassword123@db:5432/infiniteseo
      - REDIS_URL=redis://redis:6380/0
    restart: always
    depends_on:
      - db
      - redis
      - web

  db:
    image: postgres:15-alpine
    container_name: infiniteseo_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=securepassword123
      - POSTGRES_DB=infiniteseo
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: infiniteseo_redis
    command: redis-server --port 6380
    ports:
      - "6380:6380"
    restart: always

volumes:
  pgdata:
